
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Gestor de Tareas</title>
</head>

<body>
<header>
<h1>Aplicación de Gestión de Tareas</h1>
</header>

<main>

<section aria-labelledby="task-form-title">

<h2 id="task-form-title">Añadir nueva tarea</h2>
<form id="taskForm">
<div>
<label for="taskTitle">Título de la tarea</label>
<input 
type="text" 
id="taskTitle" 
name="taskTitle" 
required 
placeholder="Ej: Estudiar JavaScript">
<label for="taskDescription">Descripción</label>
<textarea 
id="taskDescription" 
name="taskDescription"
rows="3"
placeholder="Detalles de la tarea"></textarea>
</div>
<button type="submit">
Añadir tarea
</button>

</form>

</section>


<section aria-labelledby="task-list-title">

<h2 id="task-list-title">Lista de tareas</h2>

<div class="task-toolbar" aria-label="Herramientas de lista de tareas">
<label class="visually-hidden" for="searchInput">Buscar tareas</label>
<input
type="search"
id="searchInput"
name="searchInput"
placeholder="Buscar por título…"
autocomplete="off">
</div>

<ul id="taskList">
<!-- Las tareas se insertarán aquí -->
</ul>

</section>

</main>


<aside aria-labelledby="stats-title">

<h2 id="stats-title">Estadísticas</h2>

<ul>

<li>
<strong>Total:</strong>
<span id="totalTasks">0</span>
</li>

<li>
<strong>Completadas:</strong>
<span id="completedTasks">0</span>
</li>

<li>
<strong>Pendientes:</strong>
<span id="pendingTasks">0</span>
</li>

</ul>

</aside>

<footer>

<p>Aplicación de tareas desarrollada con HTML semántico</p>

</footer>


<!-- PLANTILLA DE TAREA -->

<template id="taskTemplate">

<li class="task">

<article>

<h3 class="task-title"></h3>

<p class="task-description"></p>

<div class="task-actions">

<button class="complete-btn">
Completar
</button>

<button class="delete-btn">
Eliminar
</button>

</div>

</article>

</li>

</template>

<script type="module" src="js/main.js"></script>
</body>
</html>
